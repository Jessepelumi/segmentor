<!doctype html>
<html>
  <head>
    <title>Segmentor Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
      body {
        font-family: sans-serif;
        max-width: 860px;
        margin: 40px auto;
        padding: 0 20px;
      }
      video {
        width: 100%;
        background: #000;
      }
      input {
        width: 400px;
        padding: 8px;
        font-size: 14px;
      }
      button {
        padding: 8px 16px;
        font-size: 14px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h2>Segmentor Player</h2>

    <div style="margin-bottom: 16px">
      <input
        id="videoId"
        type="text"
        placeholder="Paste video_id from upload response"
      />
      <button onclick="loadVideo()">Load</button>
    </div>

    <video id="video" controls></video>

    <script>
      let hls = null;

      function loadVideo() {
        const videoId = document.getElementById("videoId").value.trim();
        if (!videoId) return;

        const url = `http://localhost:8080/videos/${videoId}/index.m3u8`;
        const video = document.getElementById("video");

        // Destroy previous instance if reloading
        if (hls) {
          hls.destroy();
        }

        if (Hls.isSupported()) {
          hls = new Hls();
          hls.loadSource(url);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
          video.src = url;
        }
      }
    </script>
  </body>
</html>
